<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 대머리 관상 분석 PRO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 언어 선택 바 -->
    <nav class="lang-bar">
        <select id="lang-select">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="zh">🇨🇳 简体中文</option>
        </select>
    </nav>

    <div class="theme-toggle-container">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="테마 전환">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <div class="app-container">
        <header class="app-header">
            <h1 data-i18n="main-title">🧑‍🦲 대머리 관상 분석 PRO 👨‍🦱</h1>
            <p data-i18n="main-desc">실시간 웹캠 또는 사진 업로드로<br>당신의 풍성함을 확인하세요!</p>
        </header>

        <main class="app-main">
            <!-- 모드 선택 -->
            <div class="mode-selection">
                <button id="use-webcam-btn" class="mode-btn" data-i18n="btn-webcam">🎥 실시간 웹캠</button>
                <button id="use-upload-btn" class="mode-btn" style="background-color: var(--accent-color);" data-i18n="btn-upload">📸 사진 업로드</button>
            </div>

            <!-- 웹캠 섹션 -->
            <section id="webcam-section" class="hidden">
                <div id="webcam-container" class="image-preview-box"></div>
                <div class="prediction-results">
                    <div id="webcam-label-container" class="bars-container"></div>
                </div>
            </section>

            <!-- 업로드 섹션 -->
            <section class="upload-section hidden" id="upload-section">
                <div class="upload-box" id="drop-area">
                    <input type="file" id="image-upload" accept="image/*" class="file-input" style="display:none;">
                    <label for="image-upload" style="cursor:pointer;">
                        <div style="font-size: 3rem; margin-bottom: 10px;">👴</div>
                        <h3 data-i18n="upload-title">사진 선택 또는 드래그</h3>
                    </label>
                </div>
            </section>

            <!-- 로딩 화면 -->
            <section class="loading-section hidden" id="loading-section">
                <div class="spinner"></div>
                <p id="loading-text" data-i18n="loading-text">관상 분석 모델 가동 중...</p>
            </section>

            <!-- 결과 화면 (사진 업로드용) -->
            <section class="result-section hidden" id="result-section">
                <div class="image-preview-box">
                    <img id="image-preview" src="" alt="Preview">
                </div>
                <div class="prediction-results">
                    <h2 id="dominant-result" data-i18n="result-title">분석 결과</h2>
                    <div id="label-container" class="bars-container"></div>
                </div>
                <button type="button" class="retry-btn" id="retry-btn" data-i18n="btn-retry">다시 하기</button>
            </section>
        </main>
        
        <footer class="app-footer">
            <p data-i18n="footer-text">💡 사진은 저장되지 않으니 안심하세요!</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
