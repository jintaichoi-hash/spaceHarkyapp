<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ice Hockey Game</title>
  <meta name="google-adsense-account" content="ca-pub-8179129753758760">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8179129753758760"
     crossorigin="anonymous"></script>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">LIGHT MODE</button>
  <div id="game-container">
    <div id="start-overlay" class="overlay">
      <h1>ICE HOCKEY</h1>
      <button id="start-button">START GAME</button>
    </div>
    <div id="game-over-overlay" class="overlay hidden">
      <h1 id="game-over-message"></h1>
      <button id="restart-button">RESTART</button>
    </div>
    <div class="scoreboard">
      <div id="player-score">0</div>
      <div id="ai-score">0</div>
    </div>
    <div id="timer-display">02:00</div>
    <div id="goal-notification" class="hidden">GOAL!</div>
    <canvas id="game-canvas"></canvas>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
